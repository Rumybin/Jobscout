name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Go
    runs-on: ubuntu-latest
    env:
      TEST_DATABASE_URL: postgres://jobscout:jobscout@localhost:5432/jobscout?sslmode=disable

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: jobscout
          POSTGRES_PASSWORD: jobscout
          POSTGRES_DB: jobscout
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U jobscout -d jobscout"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -count=1 ./...
